version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: eduraq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eduraq
      POSTGRES_PASSWORD: eduraq
      POSTGRES_DB: eduraq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduraq"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
